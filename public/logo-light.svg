  <polygon points="64,355 349,355 360,368 349,381 64,381" fill="#F37021"/>
  <text x="205" y="373" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" text-anchor="middle">E</text>

  <!-- F -->
  <polygon points="64,385 382,385 393,398 382,411 64,411" fill="#ED1C24"/>
  <text x="221" y="403" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" text-anchor="middle">F</text>

  <!-- G -->
  <polygon points="64,415 415,415 426,428 415,441 64,441" fill="#B31217"/>
  <text x="238" y="433" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" text-anchor="middle">G</text>

  <!-- Zephren -->
  <text x="253" y="515" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="62" text-anchor="middle" letter-spacing="3"><tspan fill="#007A3D">Z</tspan><tspan fill="#1e293b">ephren</tspan></text>

  <!-- Linie separatoare -->
  <line x1="120" y1="530" x2="380" y2="530" stroke="#94a3b8" stroke-width="1"/>

  <!-- Tagline -->
  <text x="250" y="550" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="1.5">Energy Performance Calculator</text>
