<svg viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg" width="500" height="580">
  <rect width="500" height="580" fill="none"/>

  <!-- Coș -->
  <rect x="332" y="74" width="36" height="90" fill="#1e293b" rx="2"/>

  <!-- Acoperiș deschis — contur fără umplutură -->
  <polyline points="50,205 250,50 450,205" fill="none" stroke="#1e293b" stroke-width="14" stroke-linejoin="miter"/>

  <!-- Perete stâng -->
  <rect x="50" y="205" width="14" height="241" fill="#1e293b"/>

  <!-- Podea -->
  <rect x="50" y="446" width="400" height="14" fill="#1e293b"/>

  <!-- A+ -->
  <polygon points="64,205 184,205 195,218 184,231 64,231" fill="#00A550"/>
  <text x="122" y="223" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" text-anchor="middle">A+</text>

  <!-- A -->
  <polygon points="64,235 217,235 228,248 217,261 64,261" fill="#4CB848"/>
  <text x="139" y="253" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" text-anchor="middle">A</text>

  <!-- B -->
  <polygon points="64,265 250,265 261,278 250,291 64,291" fill="#BDD630"/>
  <text x="155" y="283" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#333333" text-anchor="middle">B</text>

  <!-- C -->
  <polygon points="64,295 283,295 294,308 283,321 64,321" fill="#FFF200"/>
  <text x="172" y="313" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#333333" text-anchor="middle">C</text>

  <!-- D -->
  <polygon points="64,325 316,325 327,338 316,351 64,351" fill="#FDB913"/>
  <text x="188" y="343" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white" text-anchor="middle">D</text>

