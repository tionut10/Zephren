  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    // Nuke all old service workers and caches, then register fresh
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var hadOld = false;
        regs.forEach(function(r) { r.unregister(); hadOld = true; });
        // Clear all caches
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
        // If we nuked old SWs, reload once to get fresh assets
        if (hadOld && !sessionStorage.getItem('sw_nuked')) {
          sessionStorage.setItem('sw_nuked', '1');
          window.location.reload();
          return;
        }
        sessionStorage.removeItem('sw_nuked');
        // Register new SW after cleanup
        navigator.serviceWorker.register('/sw.js').catch(function(){});
      });
    }
    </script>
  </body>
